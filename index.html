<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=yes, viewport-fit=cover">
    <title>Капибара Джамп 🍊 v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            touch-action: pan-x pan-y; 
        }
        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #87CEEB;
            max-width: 100vw;
            max-height: 100vh;
            touch-action: none; 
        }
        .top-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
        }
        .top-hud span {
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 12px;
        }
        .shop-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .shop-panel h2 {
            color: #ffcc00;
            margin-bottom: 20px;
        }
        .skin-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 10px;
            margin: 5px 0;
            width: 80%;
            cursor: pointer;
        }
        .skin-item:hover {
            border-color: #ffcc00;
        }
        .skin-item.bought {
            opacity: 0.6;
            border-color: #00ff88;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="top-hud">
        <span>⏱️ <span id="timerDisplay">0.00</span></span>
        <span>🍊 <span id="scoreDisplay">0</span></span>
        <span>🏆 <span id="highScoreDisplay">0</span></span>
    </div>
    <div class="shop-panel" id="shopPanel">
        <h2>🛒 Магазин</h2>
        <div id="skinList"></div>
        <button style="padding:10px 20px;border-radius:20px;border:none;background:#ff00ff;color:#fff;cursor:pointer;" onclick="document.getElementById('shopPanel').style.display='none'">Закрыть</button>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const timerDisplay = document.getElementById('timerDisplay');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const highScoreDisplay = document.getElementById('highScoreDisplay');
            const shopPanel = document.getElementById('shopPanel');
            const skinList = document.getElementById('skinList');

            // Аудио (Web Audio)
            let audioCtx = null;
            function initAudio() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            function playTone(freq, duration, type='square', vol=0.1) {
                try {
                    initAudio();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch(e) {}
            }

            // Адаптивный размер
            function resizeCanvas() {
                const size = Math.min(window.innerWidth, window.innerHeight) * 0.95;
                canvas.width = size;
                canvas.height = size * 1.6; 
                if (canvas.height > window.innerHeight * 0.95) {
                    canvas.height = window.innerHeight * 0.95;
                    canvas.width = canvas.height / 1.6;
                }
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                initPlatforms();
            });

            // Игровые переменные
            let capybara = {
                x: canvas.width / 2,
                y: canvas.height * 0.7,
                width: 50,
                height: 50,
                velocityY: 0,
                velocityX: 0,
                rotation: 0
            };

            const GRAVITY = 0.5;
            const JUMP_FORCE = -9;
            const MAX_SPEED = 12;
            const MOVE_SPEED = 0.4;
            let platforms = [];
            let birds = [];
            let score = 0;
            let highScore = localStorage.getItem('capybaraHighScore') || 0;
            let gameOver = false;
            let gameStarted = false;
            let tiltX = 0;
            let timer = 0;
            let timerRunning = false;
            let jumpCount = 0;
            let coins = parseInt(localStorage.getItem('capy_coins') || '0');
            let currentSkin = localStorage.getItem('capy_skin') || 'default';
            let ownedSkins = JSON.parse(localStorage.getItem('capy_owned_skins') || '["default"]');

            // Скины
            const SKINS = [
                { id: 'default', name: 'Классическая', emoji: '🦫', price: 0 },
                { id: 'golden', name: 'Золотая', emoji: '🦁', price: 100 },
                { id: 'ninja', name: 'Ниндзя', emoji: '🥷', price: 200 },
                { id: 'alien', name: 'Пришелец', emoji: '👾', price: 500 },
                { id: 'cyber', name: 'Кибер', emoji: '🤖', price: 1000 }
            ];

            let touchStartX = 0;
            highScoreDisplay.textContent = highScore;

            // Генерация платформ
            function createPlatform(x, y, width = 70, type = 'normal') {
                return {
                    x: x,
                    y: y,
                    width: width,
                    height: 15,
                    type: type,
                    color: type === 'gold' ? '#FFD700' : type === 'break' ? '#FF4444' : '#6B8E23',
                };
            }

            function initPlatforms() {
                platforms = [];
                platforms.push(createPlatform(canvas.width / 2 - 35, capybara.y + capybara.height + 5, 80));
                for (let i = 0; i < 8; i++) {
                    let platY = capybara.y - (i * 70) - 30;
                    let platX = Math.random() * (canvas.width - 70);
                    let type = Math.random() < 0.1 ? 'gold' : (Math.random() < 0.1 ? 'break' : 'normal');
                    platforms.push(createPlatform(platX, platY, 60 + Math.random() * 30, type));
                }
            }

            function resetGame() {
                capybara.x = canvas.width / 2;
                capybara.y = canvas.height * 0.7;
                capybara.velocityY = 0;
                capybara.velocityX = 0;
                capybara.rotation = 0;
                score = 0;
                gameOver = false;
                gameStarted = false;
                tiltX = 0;
                timer = 0;
                timerRunning = false;
                jumpCount = 0;
                timerDisplay.textContent = '0.00';
                scoreDisplay.textContent = '0';
                birds = [];
                initPlatforms();
            }

            // Обработчики ввода
            function handleTouchStart(e) {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                    return;
                }
                if (!gameStarted) {
                    gameStarted = true;
                    timerRunning = true;
                    capybara.velocityY = JUMP_FORCE;
                    jumpCount++;
                    playTone(600, 0.1, 'sine', 0.08);
                } else {
                    capybara.velocityY = JUMP_FORCE;
                    jumpCount++;
                    playTone(600, 0.1, 'sine', 0.08);
                }
                const touch = e.touches[0];
                touchStartX = touch.clientX;
            }

            function handleTouchMove(e) {
                e.preventDefault();
                if (gameOver || !gameStarted) return;
                const touch = e.touches[0];
                const deltaX = touch.clientX - touchStartX;
                capybara.x += deltaX * 0.8;
                touchStartX = touch.clientX;
                if (capybara.x - capybara.width/2 < 0) capybara.x = capybara.width/2;
                if (capybara.x + capybara.width/2 > canvas.width) capybara.x = canvas.width - capybara.width/2;
            }

            function handleTouchEnd(e) {
                e.preventDefault();
            }

            function handleOrientation(e) {
                if (gameOver || !gameStarted) return;
                const gamma = e.gamma; 
                if (gamma !== null && Math.abs(gamma) < 60) {
                    tiltX = gamma / 30;
                }
            }

            function handleKeyDown(e) {
                if (e.key === 'ArrowLeft' || e.key === 'a') {
                    e.preventDefault();
                    capybara.velocityX = -MOVE_SPEED * 20;
                } else if (e.key === 'ArrowRight' || e.key === 'd') {
                    e.preventDefault();
                    capybara.velocityX = MOVE_SPEED * 20;
                } else if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (gameOver) {
                        resetGame();
                        return;
                    }
                    if (!gameStarted) {
                        gameStarted = true;
                        timerRunning = true;
                        capybara.velocityY = JUMP_FORCE;
                        jumpCount++;
                        playTone(600, 0.1, 'sine', 0.08);
                    } else {
                        capybara.velocityY = JUMP_FORCE;
                        jumpCount++;
                        playTone(600, 0.1, 'sine', 0.08);
                    }
                }
            }

            function handleKeyUp(e) {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') {
                    e.preventDefault();
                    capybara.velocityX = 0;
                }
            }

            canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
            canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
            canvas.addEventListener('touchend', handleTouchEnd);
            canvas.addEventListener('touchcancel', handleTouchEnd);
            window.addEventListener('deviceorientation', handleOrientation);
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            document.body.addEventListener('touchmove', function(e) {
                if (e.target === canvas) e.preventDefault();
            }, {passive: false});

            // Обновление игры
            function update() {
                if (gameOver || !gameStarted) return;

                // Таймер
                if (timerRunning) {
                    timer += 0.016;
                    timerDisplay.textContent = timer.toFixed(2);
                }

                // Гравитация
                capybara.velocityY += GRAVITY;
                if (capybara.velocityY > MAX_SPEED) capybara.velocityY = MAX_SPEED;
                capybara.y += capybara.velocityY;
                capybara.rotation += capybara.velocityY * 0.05;

                let moveX = capybara.velocityX || 0;
                if (Math.abs(tiltX) > 0.05) {
                    moveX = tiltX * MOVE_SPEED * 25;
                }
                capybara.x += moveX;

                // ИСПРАВЛЕНИЕ БАГА — остановка у краёв, а не телепорт
                if (capybara.x - capybara.width/2 < 0) {
                    capybara.x = capybara.width/2;
                } else if (capybara.x + capybara.width/2 > canvas.width) {
                    capybara.x = canvas.width - capybara.width/2;
                }

                if (capybara.velocityY > 0) {
                    for (let i = 0; i < platforms.length; i++) {
                        let p = platforms[i];
                        if (capybara.y + capybara.height >= p.y && 
                            capybara.y + capybara.height - capybara.velocityY <= p.y + p.height &&
                            capybara.x + capybara.width/2 > p.x && 
                            capybara.x - capybara.width/2 < p.x + p.width) {
                            
                            capybara.velocityY = JUMP_FORCE;
                            capybara.y = p.y - capybara.height;
                            capybara.rotation = 0;
                            
                            if (p.type === 'gold') {
                                coins += 5;
                                localStorage.setItem('capy_coins', coins);
                                playTone(900, 0.15, 'sine', 0.15);
                            } else if (p.type === 'break') {
                                platforms.splice(i, 1);
                            }
                            
                            score += 10;
                            if (score > highScore) {
                                highScore = score;
                                localStorage.setItem('capybaraHighScore', highScore);
                                highScoreDisplay.textContent = highScore;
                            }
                            break;
                        }
                    }
                }

                // Птицы
                for (let i = birds.length - 1; i >= 0; i--) {
                    let bird = birds[i];
                    bird.x += bird.vx;
                    bird.y += bird.vy;
                    if (bird.x < -50 || bird.x > canvas.width + 50) {
                        birds.splice(i, 1);
                        continue;
                    }
                    if (capybara.x + capybara.width/2 > bird.x - bird.radius &&
                        capybara.x - capybara.width/2 < bird.x + bird.radius &&
                        capybara.y + capybara.height/2 > bird.y - bird.radius &&
                        capybara.y - capybara.height/2 < bird.y + bird.radius) {
                        gameOver = true;
                        gameStarted = false;
                        timerRunning = false;
                        playTone(200, 0.3, 'sawtooth', 0.15);
                    }
                }

                if (capybara.y - capybara.height > canvas.height) {
                    gameOver = true;
                    gameStarted = false;
                    timerRunning = false;
                    playTone(200, 0.3, 'sawtooth', 0.15);
                }

                // Камера вверх
                if (capybara.y < canvas.height * 0.4 && capybara.velocityY < 0) {
                    let diff = (canvas.height * 0.4 - capybara.y);
                    capybara.y = canvas.height * 0.4;
                    for (let p of platforms) {
                        p.y += diff;
                    }
                    for (let bird of birds) {
                        bird.y += diff;
                    }
                    platforms = platforms.filter(p => p.y < canvas.height + 50);
                    while (platforms.length < 8) {
                        let newY = platforms.length > 0 ? 
                            Math.min(...platforms.map(p => p.y)) - 60 - Math.random() * 40 : 
                            -20;
                        let newX = Math.random() * (canvas.width - 70);
                        let type = Math.random() < 0.1 ? 'gold' : (Math.random() < 0.1 ? 'break' : 'normal');
                        platforms.push(createPlatform(newX, newY, 50 + Math.random() * 40, type));
                    }
                    if (Math.random() < 0.2) {
                        birds.push({
                            x: Math.random() < 0.5 ? -20 : canvas.width + 20,
                            y: 50 + Math.random() * (canvas.height * 0.5),
                            radius: 15,
                            vx: (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 2),
                            vy: (Math.random() - 0.5) * 1.5
                        });
                    }
                }
            }

            // Рисование капибары
            function drawCapybara(x, y) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(capybara.rotation);
                ctx.fillStyle = '#8B5A2B';
                ctx.beginPath();
                ctx.ellipse(0, 0, capybara.width/2, capybara.height/2.2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#D2B48C';
                ctx.beginPath();
                ctx.ellipse(0, capybara.height/6, capybara.width/3.5, capybara.height/3.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-capybara.width/6, -capybara.height/8, capybara.width/8, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(capybara.width/6, -capybara.height/8, capybara.width/8, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(-capybara.width/6 + 2, -capybara.height/8, capybara.width/14, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(capybara.width/6 + 2, -capybara.height/8, capybara.width/14, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-capybara.width/6, -capybara.height/8 - 2, capybara.width/20, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(capybara.width/6, -capybara.height/8 - 2, capybara.width/20, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#4A2F1A';
                ctx.beginPath();
                ctx.ellipse(0, capybara.height/10, capybara.width/10, capybara.width/12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#8B5A2B';
                ctx.beginPath();
                ctx.arc(-capybara.width/2.5, -capybara.height/2.5, capybara.width/7, 0, Math.PI, true);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(capybara.width/2.5, -capybara.height/2.5, capybara.width/7, 0, Math.PI, true);
                ctx.fill();
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath();
                ctx.arc(0, -capybara.height/2.2, capybara.width/6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.ellipse(0, -capybara.height/2.2 - capybara.width/7, capybara.width/9, capybara.width/12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }

            function drawPlatform(p) {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 5);
                ctx.fill();
                if (p.type === 'gold') {
                    ctx.fillStyle = '#FFA500';
                    ctx.font = '16px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⭐', p.x + p.width/2, p.y + 12);
                }
                if (p.type === 'break') {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(p.x + 2, p.y + 2, p.width - 4, p.height - 4);
                }
            }

            function drawBird(bird) {
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(bird.x - 4, bird.y - 3, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(bird.x + 4, bird.y - 3, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Полифилл roundRect
            if (!ctx.roundRect) {
                ctx.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                    ctx.beginPath();
                    ctx.moveTo(x + r.tl, y);
                    ctx.lineTo(x + w - r.tr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    ctx.lineTo(x + w, y + h - r.br);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    ctx.lineTo(x + r.bl, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    ctx.lineTo(x, y + r.tl);
                    ctx.quadraticCurveTo(x, y, x + r.tl, y);
                    ctx.closePath();
                };
            }

            function drawBackground() {
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.7, '#E0F7FA');
                gradient.addColorStop(1, '#B2DFDB');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    let cloudX = (i * 120 + Date.now() * 0.01) % (canvas.width + 100) - 50;
                    let cloudY = 50 + i * 40;
                    ctx.arc(cloudX, cloudY, 25, 0, Math.PI*2);
                    ctx.arc(cloudX + 30, cloudY - 10, 30, 0, Math.PI*2);
                    ctx.arc(cloudX + 60, cloudY, 25, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            function drawUI() {
                if (!gameStarted && !gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px "Segoe UI"';
                    ctx.textAlign = 'center';
                    ctx.fillText('КАПИБАРА ДЖАМП', canvas.width/2, canvas.height/2 - 30);
                    ctx.font = '18px "Segoe UI"';
                    ctx.fillText('Коснитесь, чтобы прыгать', canvas.width/2, canvas.height/2 + 20);
                    ctx.fillText('Наклоняйте телефон для движения', canvas.width/2, canvas.height/2 + 50);
                    if (coins > 0) {
                        ctx.fillText(`🍊 ${coins}`, canvas.width/2, canvas.height/2 + 80);
                    }
                }
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#FF6B6B';
                    ctx.font = 'bold 28px "Segoe UI"';
                    ctx.textAlign = 'center';
                    ctx.fillText('УПС!', canvas.width/2, canvas.height/2 - 40);
                    ctx.fillStyle = 'white';
                    ctx.font = '20px "Segoe UI"';
                    ctx.fillText(`Счёт: ${score}`, canvas.width/2, canvas.height/2 + 10);
                    ctx.fillText('Коснитесь, чтобы начать заново', canvas.width/2, canvas.height/2 + 50);
                }
            }

            // Магазин
            function renderShop() {
                skinList.innerHTML = '';
                SKINS.forEach(skin => {
                    const owned = ownedSkins.includes(skin.id);
                    const div = document.createElement('div');
                    div.className = 'skin-item' + (owned ? ' bought' : '');
                    div.innerHTML = `
                        <span style="font-size:2rem;">${skin.emoji}</span>
                        <span>${skin.name}</span>
                        <span>${owned ? '✅' : '🍊 ' + skin.price}</span>
                    `;
                    div.addEventListener('click', () => {
                        if (owned) {
                            currentSkin = skin.id;
                            localStorage.setItem('capy_skin', skin.id);
                            renderShop();
                        } else if (coins >= skin.price) {
                            coins -= skin.price;
                            ownedSkins.push(skin.id);
                            localStorage.setItem('capy_coins', coins);
                            localStorage.setItem('capy_owned_skins', JSON.stringify(ownedSkins));
                            currentSkin = skin.id;
                            localStorage.setItem('capy_skin', skin.id);
                            renderShop();
                        } else {
                            alert('Не хватает 🍊!');
                        }
                    });
                    skinList.appendChild(div);
                });
            }

            function gameLoop() {
                update();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawBackground();
                for (let p of platforms) {
                    drawPlatform(p);
                }
                for (let bird of birds) {
                    drawBird(bird);
                }
                drawCapybara(capybara.x, capybara.y);
                drawUI();
                requestAnimationFrame(gameLoop);
            }

            // Инициализация
            initPlatforms();
            gameLoop();
            document.addEventListener('dblclick', function(e) {
                if (e.target === canvas) e.preventDefault();
            });
        })();
    </script>
