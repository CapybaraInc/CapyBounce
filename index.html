<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>🎮 CapyBounce · Хроники Капибары</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', monospace;
            touch-action: pan-x pan-y; 
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            background: #000;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,255,200,0.3), 0 0 0 3px #1f1f1f;
            margin: 0 auto;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: black;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.2rem 0.8rem;
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f0f0ff;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #00ffc3;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            width: fit-content;
            margin-left: auto;
            border: 1px solid rgba(0,255,200,0.6);
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }
        .btn {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid #00ffc3;
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(0,255,180,0.5);
            transition: all 0.1s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            background: radial-gradient(circle at 30% 30%, rgba(0,255,200,0.4), #0a0a1a);
            color: #e0ffff;
            text-shadow: 0 0 12px white;
        }
        .btn:active {
            transform: scale(0.85);
            background: #00ffc3;
            color: black;
            box-shadow: 0 0 40px #00ffaa;
        }
        .message {
            color: white;
            text-align: center;
            font-size: 1rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            align-self: center;
            border: 1px solid magenta;
            color: #ffb3ff;
            text-shadow: 0 0 8px magenta;
        }
        .hidden {
            opacity: 0;
            transition: 0.2s;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas" width="360" height="640"></canvas>
    <div class="ui-overlay">
        <div class="score-panel" id="scoreDisplay">💫 0</div>
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; gap: 8px;">
            <div class="message" id="messageBox">🎵 в ритм!</div>
            <div class="controls">
                <button class="btn" id="leftBtn">◀</button>
                <button class="btn" id="rightBtn">▶</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const messageBox = document.getElementById('messageBox');

        // ---------- АДАПТИВ ----------
        const W = 360, H = 640;

        // ---------- СОСТОЯНИЯ ----------
        let gameActive = true;
        let score = 0;

        // ---------- КАПИБАРА ----------
        const capy = {
            x: W/2,
            y: H - 130,
            radius: 18,
            vx: 0,
            vy: 0,
            speed: 3.8,
            jumpPower: -6.2,
            gravity: 0.45,
            onGround: false,
            earsOffset: 0
        };

        // ---------- ПЛАТФОРМЫ ----------
        let platforms = [];
        const PLATFORM_WIDTH = 70;
        const PLATFORM_HEIGHT = 8;
        const MIN_PLATFORM_Y = 100;

        // ---------- ВРАГИ ----------
        let enemies = [];

        // ---------- МУЗЫКА / РИТМ ----------
        let beatTime = 0;
        const BEAT_INTERVAL = 42; // кадры ~0.7 сек при 60fps
        let frameCounter = 0;
        let audioCtx = null;
        let beatActive = false;

        // Попытка инициализировать аудиоконтекст (тихий ритм)
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.log("Web Audio не поддерживается, ритм визуальный");
            }
        }

        function playTick() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.08);
        }

        // ---------- СОЗДАНИЕ ПЛАТФОРМ ----------
        function spawnPlatform(y) {
            let x = Math.random() * (W - PLATFORM_WIDTH);
            // не даём слишком у края
            x = Math.max(10, Math.min(x, W - PLATFORM_WIDTH - 10));
            return {
                x, y,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                beatOffset: Math.random() * Math.PI * 2,
                color: `hsl(${Math.random() * 60 + 140}, 90%, 70%)`
            };
        }

        function generateInitialPlatforms() {
            platforms = [];
            // стартовая платформа прямо под капибарой
            platforms.push({
                x: W/2 - PLATFORM_WIDTH/2,
                y: H - 110,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                beatOffset: 0,
                color: '#00ffc3'
            });
            for (let i = 1; i < 8; i++) {
                let y = H - 130 - i * 70;
                if (y < MIN_PLATFORM_Y) break;
                platforms.push(spawnPlatform(y));
            }
        }

        function addNewPlatformAbove() {
            // находим самую верхнюю платформу
            let minY = Math.min(...platforms.map(p => p.y));
            if (minY > MIN_PLATFORM_Y + 30) {
                let newY = minY - 60 - Math.random() * 25;
                if (newY < MIN_PLATFORM_Y) newY = MIN_PLATFORM_Y;
                platforms.push(spawnPlatform(newY));
            }
        }

        function removeLowestPlatforms() {
            platforms = platforms.filter(p => p.y < H + 50);
        }

        // ---------- ВРАГИ ----------
        function spawnEnemy() {
            let y = Math.random() * (H - 200) + 80;
            let x = Math.random() > 0.5 ? -20 : W + 20;
            let dir = x < 0 ? 1 : -1;
            return {
                x, y,
                radius: 14,
                vx: dir * (1.8 + Math.random() * 2.5),
                vy: 0,
                color: '#ff4d6d',
                beatPhase: Math.random() * 100
            };
        }

        function manageEnemies() {
            if (enemies.length < 3 && Math.random() < 0.02 && gameActive) {
                enemies.push(spawnEnemy());
            }
            // движение врагов и удаление
            for (let i = enemies.length-1; i >= 0; i--) {
                let e = enemies[i];
                e.x += e.vx;
                // ритмичное покачивание
                e.y += Math.sin(frameCounter * 0.2 + e.beatPhase) * 0.3;
                if (e.x < -50 || e.x > W+50) {
                    enemies.splice(i,1);
                }
            }
        }

        // ---------- СТОЛКНОВЕНИЯ ----------
        function checkCollisions() {
            // капибара с платформами
            capy.onGround = false;
            for (let p of platforms) {
                let capyLeft = capy.x - capy.radius;
                let capyRight = capy.x + capy.radius;
                let capyTop = capy.y - capy.radius;
                let capyBottom = capy.y + capy.radius;

                let platLeft = p.x;
                let platRight = p.x + p.width;
                let platTop = p.y;
                let platBottom = p.y + p.height;

                if (capyRight > platLeft && capyLeft < platRight &&
                    capyBottom > platTop && capyTop < platBottom) {
                    // проверяем, падает ли сверху
                    if (capy.vy >= 0 && capyBottom - capy.vy <= platTop + 4) {
                        capy.y = platTop - capy.radius;
                        capy.vy = 0;
                        capy.onGround = true;
                    }
                }
            }

            // враги с капибарой
            for (let e of enemies) {
                let dx = capy.x - e.x;
                let dy = capy.y - e.y;
                let dist = Math.sqrt(dx*dx+dy*dy);
                if (dist < capy.radius + e.radius) {
                    gameActive = false;
                    messageBox.textContent = '💔 попробуй снова';
                }
            }
        }

        function updateCapybara() {
            capy.vy += capy.gravity;
            capy.y += capy.vy;
            capy.x += capy.vx;

            // границы экрана
            if (capy.x - capy.radius < 0) {
                capy.x = capy.radius;
            }
            if (capy.x + capy.radius > W) {
                capy.x = W - capy.radius;
            }

            // падение вниз = конец игры
            if (capy.y - capy.radius > H + 20) {
                gameActive = false;
                messageBox.textContent = '🕳️ упал...';
            }

            // если забрался высоко — добавляем платформы
            if (capy.y < H/2 - 40) {
                addNewPlatformAbove();
                // также смещаем всё вниз для эффекта камеры (упрощённо)
                let shift = 4;
                platforms.forEach(p => p.y += shift);
                enemies.forEach(e => e.y += shift);
                capy.y += shift;
                // увеличение счета за высоту
                score += 1;
            }

            // очистка платформ
            removeLowestPlatforms();
        }

        // ---------- ПРЫЖОК ----------
        function jump() {
            if (!gameActive) return;
            if (capy.onGround) {
                capy.vy = capy.jumpPower;
                capy.onGround = false;
                // бонус за ритмичный прыжок
                if (beatActive) {
                    score += 15;
                    messageBox.textContent = '🎯 ритм-бонус!';
                    playTick();
                } else {
                    score += 5;
                    messageBox.textContent = '⬆️ прыжок';
                }
                updateScore();
            }
        }

        function updateScore() {
            scoreSpan.innerHTML = `💫 ${score}`;
        }

        // ---------- РИТМ СИСТЕМА ----------
        function updateBeat() {
            frameCounter++;
            if (frameCounter % BEAT_INTERVAL === 0) {
                beatActive = true;
                // визуальная индикация (цвет фона меняется через отрисовку)
                setTimeout(() => { beatActive = false; }, 200);
                // двигаем платформы слегка
                platforms.forEach(p => {
                    p.y += Math.sin(frameCounter * 0.5 + p.beatOffset) * 0.5;
                });
            }
        }

        // ---------- УПРАВЛЕНИЕ ----------
        function handleLeft() {
            if (!gameActive) return;
            capy.vx = -capy.speed;
        }
        function handleRight() {
            if (!gameActive) return;
            capy.vx = capy.speed;
        }
        function stopHorizontal() {
            capy.vx = 0;
        }

        // ---------- ОТРИСОВКА ----------
        function drawBackground() {
            // ритмичные волны на фоне
            let gradient = ctx.createLinearGradient(0, 0, 0, H);
            let hue = beatActive ? 280 : 200;
            gradient.addColorStop(0, `hsla(${hue}, 80%, 10%, 1)`);
            gradient.addColorStop(1, '#000000');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            // волны
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                let waveY = H * 0.3 + i * 30 + Math.sin(frameCounter * 0.1 + i) * 8;
                ctx.moveTo(0, waveY);
                for (let x = 0; x < W; x+=20) {
                    let y = waveY + Math.sin(x * 0.05 + frameCounter*0.15 + i)*6;
                    ctx.lineTo(x, y);
                }
                ctx.strokeStyle = `hsla(${hue}, 90%, 70%, 0.2)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function drawPlatforms() {
            for (let p of platforms) {
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 12;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 6);
                ctx.fill();
                // свечение
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.roundRect(p.x+2, p.y-1, p.width-4, 2, 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
        }

        // утилита roundRect
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        function drawCapybara() {
            let x = capy.x, y = capy.y, r = capy.radius;
            ctx.save();
            ctx.translate(x, y);
            // тело
            ctx.fillStyle = '#C49A6C';
            ctx.shadowColor = '#ffccaa';
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.ellipse(0, 0, r, r*0.9, 0, 0, Math.PI*2);
            ctx.fill();
            // ушки
            ctx.fillStyle = '#A67B5B';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.ellipse(-12, -r+2, 7, 9, -0.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(12, -r+2, 7, 9, 0.2, 0, Math.PI*2);
            ctx.fill();
            // мордочка
            ctx.fillStyle = '#F5E6D3';
            ctx.beginPath();
            ctx.ellipse(0, 2, 10, 8, 0, 0, Math.PI*2);
            ctx.fill();
            // глаза
            ctx.fillStyle = '#1E1E1E';
            ctx.beginPath();
            ctx.arc(-7, -4, 3.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(7, -4, 3.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-8, -5, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -5, 1.2, 0, Math.PI*2);
            ctx.fill();
            // нос
            ctx.fillStyle = '#4A3B32';
            ctx.beginPath();
            ctx.ellipse(0, 3, 2.5, 1.8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        function drawEnemies() {
            for (let e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.fillStyle = e.color;
                ctx.shadowColor = '#ff3366';
                ctx.shadowBlur = 16;
                ctx.beginPath();
                ctx.arc(0, 0, e.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-4, -3, 3, 0, Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-5, -4, 1, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        function gameLoop() {
            if (!gameActive) {
                // остановка, но отрисовка продолжается
                drawBackground();
                drawPlatforms();
                drawEnemies();
                drawCapybara();
                requestAnimationFrame(gameLoop);
                return;
            }

            updateBeat();
            updateCapybara();
            manageEnemies();
            checkCollisions();
            drawBackground();
            drawPlatforms();
            drawEnemies();
            drawCapybara();

            requestAnimationFrame(gameLoop);
        }

        // ---------- СОБЫТИЯ ----------
        function restartGame() {
            gameActive = true;
            score = 0;
            updateScore();
            capy.x = W/2;
            capy.y = H - 130;
            capy.vy = 0;
            capy.vx = 0;
            enemies = [];
            generateInitialPlatforms();
            messageBox.textContent = '🎵 в ритм!';
            initAudio();
        }

        // Кнопки
        document.getElementById('leftBtn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handleLeft();
        });
        document.getElementById('rightBtn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handleRight();
        });
        document.getElementById('leftBtn').addEventListener('pointerup', stopHorizontal);
        document.getElementById('rightBtn').addEventListener('pointerup', stopHorizontal);
        document.getElementById('leftBtn').addEventListener('pointerleave', stopHorizontal);
        document.getElementById('rightBtn').addEventListener('pointerleave', stopHorizontal);

        // Прыжок по тапу на canvas (или свайп вверх)
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            jump();
            initAudio();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
            initAudio();
        });

        // Перезапуск при двойном тапе на сообщение
        messageBox.addEventListener('click', () => {
            if (!gameActive) restartGame();
        });

        // Старт
        generateInitialPlatforms();
        updateScore();
        gameLoop();
        initAudio();
    })();
</script>
</body>
</html>
