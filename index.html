

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=yes, viewport-fit=cover">
    <title>Капибара Джамп 🍊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            touch-action: pan-x pan-y; 
        }
        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #87CEEB;
            max-width: 100vw;
            max-height: 100vh;
            touch-action: none; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Адаптивный размер
            function resizeCanvas() {
                const size = Math.min(window.innerWidth, window.innerHeight) * 0.95;
                canvas.width = size;
                canvas.height = size * 1.6; 
                if (canvas.height > window.innerHeight * 0.95) {
                    canvas.height = window.innerHeight * 0.95;
                    canvas.width = canvas.height / 1.6;
                }
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                // Сбросим позиции платформ при ресайзе, чтобы не вылетали
                initPlatforms();
            });

            // Игровые переменные
            let capybara = {
                x: canvas.width / 2,
                y: canvas.height * 0.7,
                width: 50,
                height: 50,
                velocityY: 0,
                velocityX: 0,
            };

            const GRAVITY = 0.5;
            const JUMP_FORCE = -9;
            const MAX_SPEED = 12;
            const MOVE_SPEED = 0.4; // для tilt/клавиш
            let platforms = [];
            let score = 0;
            let highScore = localStorage.getItem('capybaraHighScore') || 0;
            let gameOver = false;
            let gameStarted = false;
            let tiltX = 0;

            // Генерация платформ
            function createPlatform(x, y, width = 70) {
                return {
                    x: x,
                    y: y,
                    width: width,
                    height: 15,
                    color: '#6B8E23',
                };
            }

            function initPlatforms() {
                platforms = [];
                // Стартовая платформа под капибарой
                platforms.push(createPlatform(canvas.width / 2 - 35, capybara.y + capybara.height + 5, 80));
                
                // Генерируем платформы выше
                for (let i = 0; i < 8; i++) {
                    let platY = capybara.y - (i * 70) - 30;
                    let platX = Math.random() * (canvas.width - 70);
                    platforms.push(createPlatform(platX, platY, 60 + Math.random() * 30));
                }
            }

            function resetGame() {
                capybara.x = canvas.width / 2;
                capybara.y = canvas.height * 0.7;
                capybara.velocityY = 0;
                capybara.velocityX = 0;
                score = 0;
                gameOver = false;
                gameStarted = false;
                tiltX = 0;
                initPlatforms();
            }

            // Обработчики ввода
            function handleTouchStart(e) {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                    return;
                }
                if (!gameStarted) {
                    gameStarted = true;
                    capybara.velocityY = JUMP_FORCE;
                }
                // Начало касания запоминаем позицию для свайпа
                const touch = e.touches[0];
                touchStartX = touch.clientX;
            }

            let touchStartX = 0;

            function handleTouchMove(e) {
                e.preventDefault();
                if (gameOver || !gameStarted) return;
                const touch = e.touches[0];
                const deltaX = touch.clientX - touchStartX;
                // Двигаем капибару относительно свайпа
                capybara.x += deltaX * 0.8;
                touchStartX = touch.clientX;
                
                // Ограничение по краям
                if (capybara.x - capybara.width/2 < 0) capybara.x = capybara.width/2;
                if (capybara.x + capybara.width/2 > canvas.width) capybara.x = canvas.width - capybara.width/2;
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                // Ничего особого
            }

            // Гироскоп / акселерометр (только если доступен)
            function handleOrientation(e) {
                if (gameOver || !gameStarted) return;
                // gamma: наклон влево-вправо (-90 до 90)
                const gamma = e.gamma; 
                if (gamma !== null && Math.abs(gamma) < 60) {
                    tiltX = gamma / 30; // нормализуем
                }
            }

            // Клавиатура для ПК (удобно тестировать)
            function handleKeyDown(e) {
                if (e.key === 'ArrowLeft' || e.key === 'a') {
                    e.preventDefault();
                    capybara.velocityX = -MOVE_SPEED * 20;
                } else if (e.key === 'ArrowRight' || e.key === 'd') {
                    e.preventDefault();
                    capybara.velocityX = MOVE_SPEED * 20;
                } else if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (gameOver) {
                        resetGame();
                        return;
                    }
                    if (!gameStarted) {
                        gameStarted = true;
                        capybara.velocityY = JUMP_FORCE;
                    }
                }
            }

            function handleKeyUp(e) {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') {
                    e.preventDefault();
                    capybara.velocityX = 0;
                }
            }

            // Подписка на события
            canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
            canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
            canvas.addEventListener('touchend', handleTouchEnd);
            canvas.addEventListener('touchcancel', handleTouchEnd);
            
            window.addEventListener('deviceorientation', handleOrientation);
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);

            // Предотвращаем скролл страницы на мобилках
            document.body.addEventListener('touchmove', function(e) {
                if (e.target === canvas) e.preventDefault();
            }, {passive: false});

            // Обновление игры
            function update() {
                if (gameOver || !gameStarted) return;

                // Гравитация
                capybara.velocityY += GRAVITY;
                if (capybara.velocityY > MAX_SPEED) capybara.velocityY = MAX_SPEED;
                capybara.y += capybara.velocityY;

                // Движение по X (клавиатура + tilt)
                let moveX = capybara.velocityX || 0;
                if (Math.abs(tiltX) > 0.05) {
                    moveX = tiltX * MOVE_SPEED * 25;
                }
                capybara.x += moveX;

                // Границы экрана (телепорт как в Doodle Jump)
                if (capybara.x + capybara.width/2 < 0) {
                    capybara.x = canvas.width + capybara.width/2;
                } else if (capybara.x - capybara.width/2 > canvas.width) {
                    capybara.x = -capybara.width/2;
                }

                // Проверка столкновений с платформами (только когда падает вниз)
                if (capybara.velocityY > 0) {
                    for (let i = 0; i < platforms.length; i++) {
                        let p = platforms[i];
                        // Проверка коллизии
                        if (capybara.y + capybara.height >= p.y && 
                            capybara.y + capybara.height - capybara.velocityY <= p.y + p.height &&
                            capybara.x + capybara.width/2 > p.x && 
                            capybara.x - capybara.width/2 < p.x + p.width) {
                            
                            // Прыжок
                            capybara.velocityY = JUMP_FORCE;
                            capybara.y = p.y - capybara.height;
                            
                            // Увеличиваем счет
                            score += 10;
                            if (score > highScore) {
                                highScore = score;
                                localStorage.setItem('capybaraHighScore', highScore);
                            }
                            break;
                        }
                    }
                }

                // Проверка падения вниз (Game Over)
                if (capybara.y - capybara.height > canvas.height) {
                    gameOver = true;
                    gameStarted = false;
                }

                // Двигаем камеру вверх, если капибара выше середины
                if (capybara.y < canvas.height * 0.4 && capybara.velocityY < 0) {
                    let diff = (canvas.height * 0.4 - capybara.y);
                    capybara.y = canvas.height * 0.4;
                    
                    // Сдвигаем все платформы вниз
                    for (let p of platforms) {
                        p.y += diff;
                    }

                    // Удаляем платформы, ушедшие за низ экрана, и создаем новые сверху
                    platforms = platforms.filter(p => p.y < canvas.height + 50);
                    
                    // Генерируем новые платформы сверху
                    while (platforms.length < 8) {
                        let newY = platforms.length > 0 ? 
                            Math.min(...platforms.map(p => p.y)) - 60 - Math.random() * 40 : 
                            -20;
                        let newX = Math.random() * (canvas.width - 70);
                        platforms.push(createPlatform(newX, newY, 50 + Math.random() * 40));
                    }
                }
            }

            // Рисование капибары (упрощенный милый стиль)
            function drawCapybara(x, y) {
                const w = capybara.width;
                const h = capybara.height;
                const cx = x;
                const cy = y;

                ctx.save();
                ctx.translate(cx, cy);

                // Тело (овал, коричневый)
                ctx.fillStyle = '#8B5A2B';
                ctx.beginPath();
                ctx.ellipse(0, 0, w/2, h/2.2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#5C3A1E';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Пузико светлое
                ctx.fillStyle = '#D2B48C';
                ctx.beginPath();
                ctx.ellipse(0, h/6, w/3.5, h/3.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Глаза
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-w/6, -h/8, w/8, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w/6, -h/8, w/8, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(-w/6 + 2, -h/8, w/14, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w/6 + 2, -h/8, w/14, 0, Math.PI*2);
                ctx.fill();
                
                // Блики в глазах
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-w/6, -h/8 - 2, w/20, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w/6, -h/8 - 2, w/20, 0, Math.PI*2);
                ctx.fill();

                // Нос
                ctx.fillStyle = '#4A2F1A';
                ctx.beginPath();
                ctx.ellipse(0, h/10, w/10, w/12, 0, 0, Math.PI*2);
                ctx.fill();

                // Уши (маленькие полукруги)
                ctx.fillStyle = '#8B5A2B';
                ctx.beginPath();
                ctx.arc(-w/2.5, -h/2.5, w/7, 0, Math.PI, true);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w/2.5, -h/2.5, w/7, 0, Math.PI, true);
                ctx.fill();

                // Апельсин на голове (фирменный знак!)
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath();
                ctx.arc(0, -h/2.2, w/6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.ellipse(0, -h/2.2 - w/7, w/9, w/12, 0, 0, Math.PI*2);
                ctx.fill();
                
                ctx.restore();
            }

            function drawPlatform(p) {
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 5);
                ctx.fill();
                ctx.fillStyle = '#81C784';
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height/2, 5);
                ctx.fill();
            }

            // Полифилл roundRect
            if (!ctx.roundRect) {
                ctx.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                    ctx.beginPath();
                    ctx.moveTo(x + r.tl, y);
                    ctx.lineTo(x + w - r.tr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    ctx.lineTo(x + w, y + h - r.br);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    ctx.lineTo(x + r.bl, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    ctx.lineTo(x, y + r.tl);
                    ctx.quadraticCurveTo(x, y, x + r.tl, y);
                    ctx.closePath();
                };
            }

            function drawUI() {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 18px "Segoe UI"';
                ctx.textAlign = 'left';
                ctx.fillText(`🍊 ${score}`, 15, 40);
                
                ctx.textAlign = 'right';
                ctx.fillText(`🏆 ${highScore}`, canvas.width - 15, 40);

                if (!gameStarted && !gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px "Segoe UI"';
                    ctx.textAlign = 'center';
                    ctx.fillText('КАПИБАРА ДЖАМП', canvas.width/2, canvas.height/2 - 30);
                    ctx.font = '18px "Segoe UI"';
                    ctx.fillText('Коснитесь, чтобы прыгать', canvas.width/2, canvas.height/2 + 20);
                    ctx.fillText('Наклоняйте телефон для движения', canvas.width/2, canvas.height/2 + 50);
                }

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#FF6B6B';
                    ctx.font = 'bold 28px "Segoe UI"';
                    ctx.textAlign = 'center';
                    ctx.fillText('УПС!', canvas.width/2, canvas.height/2 - 40);
                    ctx.fillStyle = 'white';
                    ctx.font = '20px "Segoe UI"';
                    ctx.fillText(`Счёт: ${score}`, canvas.width/2, canvas.height/2 + 10);
                    ctx.fillText('Коснитесь, чтобы начать заново', canvas.width/2, canvas.height/2 + 50);
                }
            }

            function drawBackground() {
                // Градиент неба
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.7, '#E0F7FA');
                gradient.addColorStop(1, '#B2DFDB');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Облачка
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    let cloudX = (i * 120 + Date.now() * 0.01) % (canvas.width + 100) - 50;
                    let cloudY = 50 + i * 40;
                    ctx.arc(cloudX, cloudY, 25, 0, Math.PI*2);
                    ctx.arc(cloudX + 30, cloudY - 10, 30, 0, Math.PI*2);
                    ctx.arc(cloudX + 60, cloudY, 25, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            function gameLoop() {
                update();
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawBackground();
                
                // Платформы
                for (let p of platforms) {
                    drawPlatform(p);
                }
                
                // Капибара
                drawCapybara(capybara.x, capybara.y);
                
                drawUI();
                
                requestAnimationFrame(gameLoop);
            }

            // Инициализация
            initPlatforms();
            gameLoop();

            // Предотвращение нежелательного зума двойным тапом
            document.addEventListener('dblclick', function(e) {
                if (e.target === canvas) e.preventDefault();
            });
        })();
    </script>
</body>
</html>
